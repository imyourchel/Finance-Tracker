<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="300" cy="300" r="260" fill="url(#g1)" opacity="0.18" />

  <!-- modern wallet box -->
  <rect x="120" y="180" rx="18" ry="18" width="360" height="220" fill="#fff" opacity="0.06" />
  <rect x="140" y="200" rx="14" ry="14" width="320" height="180" fill="#fff" opacity="0.04" />

  <!-- bars -->
  <g transform="translate(170,240)">
    <rect x="0" y="80" width="40" height="80" rx="8" fill="#fff" opacity="0.9" />
    <rect x="70" y="40" width="40" height="120" rx="8" fill="#fff" opacity="0.95" />
    <rect x="140" y="0" width="40" height="160" rx="8" fill="#fff" />
    <rect x="210" y="-30" width="40" height="190" rx="8" fill="#fff" opacity="0.88" />
  </g>

  <!-- trend line -->
  <polyline points="190,320 240,280 310,250 380,220" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
  <polygon points="380,212 392,220 372,220" fill="#fff" opacity="0.95" />

  <!-- accent coin -->
  <circle cx="460" cy="210" r="28" fill="url(#g2)" opacity="0.95" />
  <text x="460" y="218" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">$</text>

</svg>
